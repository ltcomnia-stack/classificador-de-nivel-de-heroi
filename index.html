<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Classificador de Herói</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>

    <div class="container">
        <h2>Classificador de Nível</h2>
        
        <label for="nomeHeroi">Nome do Herói:</label>
        <input type="text" id="nomeHeroi" placeholder="Ex: Arthur">
        
        <label for="xpHeroi">Experiência (XP):</label>
        <input type="number" id="xpHeroi" placeholder="Ex: 5500">
        
        <button id="btnClassificar">Classificar Nível</button>
        
        <div id="resultado"></div>
    </div>

    <script src="script.js"></script>
</body>
</html>
